<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEVELING UP — Personal OS v1.1</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: #f0f0f0;
      color: #111;
      font-size: 13px;
      min-height: 100vh;
    }

    button {
      font-family: 'Courier New', Courier, monospace;
      cursor: pointer;
    }

    input,
    textarea,
    select {
      font-family: 'Courier New', Courier, monospace;
    }

    textarea {
      resize: vertical;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #e0e0e0;
    }

    ::-webkit-scrollbar-thumb {
      background: #aaa;
    }

    .fade {
      animation: fi .15s ease;
    }

    @keyframes fi {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script>
    const { useState, useEffect, useRef, useMemo } = React;
    const h = React.createElement;

    // ══════════════════════════════════════════════
    // CONSTANTS
    // ══════════════════════════════════════════════
    const QUESTS = [
      { id: 'striver', name: 'STRIVER PROGRESS', xp: 50, coins: 10, gains: { intelligence: 2, discipline: 1 } },
      { id: 'webdev', name: 'WEB DEVELOPMENT', xp: 50, coins: 10, gains: { builder: 2, discipline: 1 } },
      { id: 'cf', name: 'CODEFORCES PROBLEM', xp: 30, coins: 5, gains: { intelligence: 1, discipline: 1 } },
      { id: 'calories', name: 'CALORIES GOAL', xp: 20, coins: 5, gains: { vitality: 2 } },
      { id: 'protein', name: 'PROTEIN GOAL', xp: 20, coins: 5, gains: { vitality: 2 } },
      { id: 'expense', name: 'EXPENSE ENTRY', xp: 10, coins: 2, gains: { wealth: 1 } },
      { id: 'note', name: 'DAILY NOTE', xp: 10, coins: 2, gains: { discipline: 1 } },
    ];
    const WEEKLY = [
      { id: 'lc', name: 'LEETCODE', target: 7, unit: 'PROBLEMS' },
      { id: 'lc_c', name: 'LEETCODE CONTEST', target: 1, unit: 'CONTEST' },
      { id: 'cfw', name: 'CODEFORCES', target: 5, unit: 'PROBLEMS' },
      { id: 'cf_c', name: 'CF CONTEST', target: 1, unit: 'CONTEST' },
      { id: 'x', name: 'CS50X', target: 1, unit: 'LECTURE' },
      { id: 'p', name: 'CS50P', target: 1, unit: 'PROB SET' },
    ];
    const RANKS = [
      { l: 'E', min: 0, max: 1000 },
      { l: 'D', min: 1000, max: 3000 },
      { l: 'C', min: 3000, max: 8000 },
      { l: 'B', min: 8000, max: 20000 },
      { l: 'A', min: 20000, max: 50000 },
      { l: 'S', min: 50000, max: Infinity },
    ];
    const SHOP = [
      { id: 'choc', name: 'CHOCOLATE', cost: 150, desc: 'A sweet self-reward.' },
      { id: 'coff', name: 'SPECIAL COFFEE', cost: 200, desc: 'Treat yourself, Hunter.' },
      { id: 'movie', name: 'MOVIE NIGHT', cost: 500, desc: 'A well-earned break.' },
      { id: 'rest', name: 'ORDER SOMETHING', cost: 700, desc: 'Dine out, no guilt.' },
      { id: 'cheat', name: 'CHEAT MEAL', cost: 1000, desc: 'Earn it, enjoy it.' },
      { id: 'skip', name: 'SKIP PASS', cost: 1200, desc: 'Protect your streak once.' },
    ];
    const EXP_CATS = ['FOOD', 'TRAVEL', 'COLLEGE', 'ENTERTAIN', 'MISC'];
    const CAT_CLR = { FOOD: '#16a34a', TRAVEL: '#4ade80', COLLEGE: '#86efac', ENTERTAIN: '#666', MISC: '#999' };
    const MONTHS = ['JANUARY', 'FEBRUARY', 'MARCH', 'APRIL', 'MAY', 'JUNE', 'JULY', 'AUGUST', 'SEPTEMBER', 'OCTOBER', 'NOVEMBER', 'DECEMBER'];
    const MONTHS_S = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
    const DAYS = ['MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT', 'SUN'];
    const STATS = ['intelligence', 'builder', 'discipline', 'vitality', 'wealth'];
    const SICON = { intelligence: '◆', builder: '⬡', discipline: '◈', vitality: '♡', wealth: '◎' };
    const IC = ['transparent', '#86efac', '#4ade80', '#16a34a'];
    const IL = ['NONE', 'LOW', 'MEDIUM', 'HIGH'];

    // ══════════════════════════════════════════════
    // UTILS
    // ══════════════════════════════════════════════
    const dKey = d => `${d.getFullYear()}-${(d.getMonth() + 1).toString().padStart(2, '0')}-${d.getDate().toString().padStart(2, '0')}`;
    const TODAY = dKey(new Date());
    const numId = () => Date.now() + Math.floor(Math.random() * 1000);
    const getRank = xp => RANKS.find(r => xp >= r.min && xp < r.max) ?? RANKS[5];
    const getInten = (done, total) => { if (!done || !total) return 0; const p = done / total; return p < .35 ? 1 : p < .70 ? 2 : 3; };
    const monthGrid = (y, m) => {
      const first = (new Date(y, m, 1).getDay() + 6) % 7, days = new Date(y, m + 1, 0).getDate();
      const cells = [...Array(first).fill(null), ...Array.from({ length: days }, (_, i) => i + 1)];
      while (cells.length % 7) cells.push(null); return cells;
    };
    const wKey = d => {
      const jan4 = new Date(d.getFullYear(), 0, 4);
      const w = Math.ceil(((d - jan4) / 86400000 + jan4.getDay() + 1) / 7);
      return `${d.getFullYear()}-W${w.toString().padStart(2, '0')}`;
    };
    const calcStreak = dayData => {
      let s = 0; const d = new Date(); d.setHours(0, 0, 0, 0);
      for (let i = 0; i < 3650; i++) {
        const k = dKey(d), dd = dayData[k] ?? { quests: [] };
        if (dd.quests.length / QUESTS.length >= .7) { s++; d.setDate(d.getDate() - 1); } else break;
      } return s;
    };

    // ══════════════════════════════════════════════
    // STORAGE  (localStorage for standalone HTML)
    // ══════════════════════════════════════════════
    const SK = 'solo_lv2';
    const db = {
      load: () => { try { const r = localStorage.getItem(SK); return r ? JSON.parse(r) : null; } catch { return null; } },
      save: d => { try { localStorage.setItem(SK, JSON.stringify(d)); } catch { } }
    };

    // ══════════════════════════════════════════════
    // DESIGN TOKENS
    // ══════════════════════════════════════════════
    const BG = '#f0f0f0', BG2 = '#f8f8f8', BD = '1px solid #aaa', TXT = '#111', DIM = '#666';
    const GREEN = '#16a34a', GMED = '#4ade80', MONO = "'Courier New',Courier,monospace";
    const S = {
      app: { fontFamily: MONO, background: BG, minHeight: '100vh', color: TXT, fontSize: 13 },
      topBar: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 16px', borderBottom: BD, background: BG, gap: 8, flexWrap: 'wrap' },
      logo: { fontWeight: 'bold', fontSize: 13, letterSpacing: 3 },
      navRow: { display: 'flex', gap: 5, alignItems: 'center', flexWrap: 'wrap' },
      page: { padding: 16 },
      card: (mb = 12) => ({ border: BD, padding: 12, marginBottom: mb, background: BG2 }),
      cardH: { fontSize: 11, fontWeight: 'bold', letterSpacing: 2, marginBottom: 10, display: 'flex', alignItems: 'center', gap: 6 },
      btn: (a = false, sm = false) => ({ padding: sm ? '2px 7px' : '4px 10px', border: BD, background: a ? TXT : BG, color: a ? BG : TXT, cursor: 'pointer', fontFamily: MONO, fontSize: sm ? 10 : 11, letterSpacing: 1 }),
      inp: (fw = false) => ({ width: fw ? '100%' : 'auto', padding: '5px 8px', border: BD, background: BG, fontFamily: MONO, fontSize: 11, color: TXT, outline: 'none', letterSpacing: 1 }),
      badge: (c = TXT) => ({ padding: '4px 9px', border: BD, fontSize: 11, letterSpacing: 1, display: 'flex', alignItems: 'center', gap: 4, color: c }),
      g: (cols, gap = 12) => ({ display: 'grid', gridTemplateColumns: cols, gap }),
      row: (gap = 8) => ({ display: 'flex', gap, alignItems: 'center' }),
      rowW: (gap = 8) => ({ display: 'flex', gap, alignItems: 'center', flexWrap: 'wrap' }),
      qrow: (done) => ({ display: 'flex', alignItems: 'center', gap: 8, padding: '7px 0', borderBottom: '1px solid #e0e0e0', cursor: 'pointer', opacity: done ? .6 : 1, userSelect: 'none' }),
      chk: (c) => ({ width: 14, height: 14, border: BD, flexShrink: 0, background: c ? TXT : BG, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, color: BG }),
      track: (h = 6) => ({ height: h, background: '#ddd', overflow: 'hidden' }),
      fill: (pct, color = GREEN) => ({ height: '100%', width: `${Math.max(0, Math.min(100, pct))}%`, background: color, transition: 'width .3s' }),
      dayCell: (inten, isT, isSel) => ({ border: isT ? '2px solid #111' : isSel ? '2px solid #555' : '1px solid #ddd', background: IC[inten], cursor: 'pointer', minHeight: 54, padding: 4, fontSize: 10, display: 'flex', flexDirection: 'column', justifyContent: 'space-between' }),
      mini: (inten, isT) => ({ width: 13, height: 13, background: IC[inten], border: isT ? '1px solid #111' : '1px solid transparent', cursor: 'pointer' }),
      lbl: { fontSize: 11, color: DIM, letterSpacing: 1 },
      bold: (sz = 16) => ({ fontWeight: 'bold', fontSize: sz }),
      tag: { fontSize: 9, padding: '1px 5px', border: '1px solid #aaa', letterSpacing: 1 },
    };

    // ══════════════════════════════════════════════
    // WEIGHT SPARKLINE (SVG)
    // ══════════════════════════════════════════════
    function WeightChart({ weights }) {
      if (weights.length < 2) return null;
      const vals = weights.map(w => w.weight);
      const mn = Math.min(...vals) - .3, mx = Math.max(...vals) + .3;
      const W = 220, H = 48;
      const px = (v, i) => [((i / (vals.length - 1)) * W).toFixed(1), (H - ((v - mn) / (mx - mn)) * H).toFixed(1)];
      const pts = vals.map((v, i) => px(v, i).join(',')).join(' ');
      return h('svg', { width: W, height: H, style: { display: 'block', border: '1px solid #ddd', background: BG } },
        h('polyline', { points: pts, fill: 'none', stroke: GREEN, strokeWidth: 1.5 }),
        ...vals.map((v, i) => { const [cx, cy] = px(v, i); return h('circle', { key: i, cx, cy, r: 2.5, fill: GREEN }); }),
        h('text', { x: 2, y: 10, fontSize: 8, fill: DIM, fontFamily: MONO }, (mx - .3).toFixed(1)),
        h('text', { x: 2, y: H - 2, fontSize: 8, fill: DIM, fontFamily: MONO }, (mn + .3).toFixed(1))
      );
    }

    // ══════════════════════════════════════════════
    // NOTES VIEW
    // ══════════════════════════════════════════════
    function NotesView({ data, setData, toast }) {
      const [selId, setSelId] = useState(null);
      const [search, setSearch] = useState('');
      const [fTitle, setFTitle] = useState('');
      const [fContent, setFContent] = useState('');
      const [fTags, setFTags] = useState('');
      const [editing, setEditing] = useState(false);

      const notes = data.notes ?? [];
      const q = search.toLowerCase();
      const filtered = notes.filter(n => !q || n.title.toLowerCase().includes(q) || (n.content ?? '').toLowerCase().includes(q) || (n.tags ?? []).some(t => t.toLowerCase().includes(q)));
      const sel = notes.find(n => n.id === selId);

      const startNew = () => { setSelId(null); setFTitle(''); setFContent(''); setFTags(''); setEditing(true); };
      const pickNote = n => { setSelId(n.id); setFTitle(n.title); setFContent(n.content ?? ''); setFTags((n.tags ?? []).join(', ')); setEditing(false); };
      const startEdit = () => { if (sel) { setFTitle(sel.title); setFContent(sel.content ?? ''); setFTags((sel.tags ?? []).join(', ')); setEditing(true); } };

      const save = () => {
        if (!fTitle.trim()) { toast('✗ TITLE REQUIRED'); return; }
        const tags = fTags.split(',').map(t => t.trim().toUpperCase()).filter(Boolean);
        const now = TODAY;
        if (selId && sel) {
          setData(d => ({ ...d, notes: (d.notes ?? []).map(n => n.id === selId ? { ...n, title: fTitle.trim().toUpperCase(), content: fContent, tags, updatedAt: now } : n) }));
          toast('✓ NOTE UPDATED');
        } else {
          const nn = { id: numId(), title: fTitle.trim().toUpperCase(), content: fContent, tags, createdAt: now, updatedAt: now };
          setData(d => ({ ...d, notes: [nn, ...(d.notes ?? [])] }));
          setSelId(nn.id);
          toast('✓ NOTE SAVED');
        }
        setEditing(false);
      };

      const del = id => { setData(d => ({ ...d, notes: (d.notes ?? []).filter(n => n.id !== id) })); setSelId(null); setEditing(false); toast('✓ NOTE DELETED'); };

      return h('div', { style: S.g('260px 1fr', 12), className: 'fade' },
        // List panel
        h('div', { style: S.card(0) },
          h('div', { style: { ...S.row(6), marginBottom: 10 } },
            h('input', { value: search, onChange: e => setSearch(e.target.value), placeholder: 'SEARCH...', style: { ...S.inp(false), flex: 1 } }),
            h('button', { onClick: startNew, style: S.btn(true, true) }, '+ NEW')
          ),
          filtered.length === 0
            ? h('div', { style: { ...S.lbl, lineHeight: 1.8 } }, 'No notes yet.', h('br'), h('br'), 'Create your first note.')
            : filtered.map(n => h('div', {
              key: n.id,
              style: {
                padding: '8px 10px', marginBottom: 4, border: n.id === selId ? '1px solid #111' : '1px solid #ddd',
                background: n.id === selId ? BG : BG2, cursor: 'pointer', borderLeft: n.id === selId ? '3px solid #111' : '3px solid transparent'
              },
              onClick: () => pickNote(n)
            },
              h('div', { style: { fontWeight: 'bold', fontSize: 11, letterSpacing: 1, marginBottom: 2, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, n.title),
              h('div', { style: { ...S.lbl, marginBottom: n.tags?.length ? 4 : 0 } }, n.updatedAt),
              n.tags?.length > 0 && h('div', { style: { display: 'flex', gap: 3, flexWrap: 'wrap' } },
                ...n.tags.map(t => h('span', { key: t, style: S.tag }, t))
              )
            ))
        ),
        // Detail / editor panel
        h('div', { style: S.card(0) },
          editing
            ? h('div', null,
              h('div', { style: S.cardH }, '✏ ' + (selId && sel ? 'EDIT NOTE' : 'NEW NOTE')),
              h('div', { style: { ...S.lbl, marginBottom: 4 } }, 'TITLE'),
              h('input', { value: fTitle, onChange: e => setFTitle(e.target.value.toUpperCase()), style: { ...S.inp(true), fontSize: 13, marginBottom: 10 } }),
              h('div', { style: { ...S.lbl, marginBottom: 4 } }, 'CONTENT'),
              h('textarea', {
                value: fContent, onChange: e => setFContent(e.target.value), rows: 11,
                style: { width: '100%', padding: '8px', border: BD, background: BG, fontFamily: MONO, fontSize: 12, color: TXT, marginBottom: 10, outline: 'none', lineHeight: 1.7 }
              }),
              h('div', { style: { ...S.lbl, marginBottom: 4 } }, 'TAGS (comma-separated)'),
              h('input', { value: fTags, onChange: e => setFTags(e.target.value), placeholder: 'DSA, IDEA, WEBDEV...', style: { ...S.inp(true), marginBottom: 12 } }),
              h('div', { style: S.row(8) },
                h('button', { onClick: save, style: { ...S.btn(true), flex: 1, padding: 8, letterSpacing: 2 } }, 'SAVE'),
                h('button', { onClick: () => setEditing(false), style: { ...S.btn(false), padding: 8 } }, 'CANCEL')
              )
            )
            : sel
              ? h('div', null,
                h('div', { style: { marginBottom: 10, paddingBottom: 8, borderBottom: '1px solid #ddd' } },
                  h('div', { style: { fontWeight: 'bold', fontSize: 14, letterSpacing: 2, marginBottom: 4 } }, sel.title),
                  h('div', { style: S.lbl }, 'Created: ' + sel.createdAt + ' · Updated: ' + sel.updatedAt),
                  sel.tags?.length > 0 && h('div', { style: { display: 'flex', gap: 4, marginTop: 6, flexWrap: 'wrap' } },
                    ...sel.tags.map(t => h('span', { key: t, style: { ...S.tag, fontSize: 10, padding: '2px 7px' } }, t))
                  )
                ),
                h('div', { style: { fontSize: 12, lineHeight: 1.9, color: TXT, whiteSpace: 'pre-wrap', marginBottom: 16, minHeight: 120 } },
                  sel.content || h('span', { style: S.lbl }, 'No content.')
                ),
                h('div', { style: S.row(8) },
                  h('button', { onClick: startEdit, style: S.btn(false) }, 'EDIT'),
                  h('button', { onClick: () => del(sel.id), style: { ...S.btn(false), borderColor: '#c00', color: '#900' } }, 'DELETE')
                )
              )
              : h('div', { style: { ...S.lbl, lineHeight: 1.9 } },
                'Select a note or create', h('br'), 'a new one to get started.'
              )
        )
      );
    }

    // ══════════════════════════════════════════════
    // HEALTH VIEW
    // ══════════════════════════════════════════════
    function HealthView({ data, setData, toast, TK }) {
      const [wIn, setWIn] = useState('');
      const [fName, setFName] = useState('');
      const [fCal, setFCal] = useState('');
      const [fPro, setFPro] = useState('');

      const H0 = { weights: [], foodLogs: [], targets: { calories: 2500, protein: 100, targetWeight: 65, startWeight: 56 } };
      const health = data.health ?? H0;
      const tgt = health.targets ?? H0.targets;

      const todayFood = (health.foodLogs ?? []).filter(f => f.date === TK);
      const totCal = todayFood.reduce((a, f) => a + (f.calories || 0), 0);
      const totPro = todayFood.reduce((a, f) => a + (f.protein || 0), 0);
      const calPct = Math.min(100, Math.round(totCal / tgt.calories * 100));
      const proPct = Math.min(100, Math.round(totPro / tgt.protein * 100));

      const sortedW = [...(health.weights ?? [])].sort((a, b) => a.date.localeCompare(b.date));
      const lastW = sortedW.length ? sortedW[sortedW.length - 1] : null;
      const sw = tgt.startWeight || 56, tw = tgt.targetWeight || 65;
      const wPct = lastW ? Math.min(100, Math.max(0, Math.round((lastW.weight - sw) / (tw - sw) * 100))) : 0;

      const logW = () => {
        const w = parseFloat(wIn);
        if (isNaN(w) || w <= 0) { toast('✗ INVALID WEIGHT'); return; }
        const e = { id: numId(), date: TK, weight: w };
        setData(d => { const H = { ...d.health ?? H0 }; return { ...d, health: { ...H, weights: [...(H.weights ?? []), e] } }; });
        setWIn(''); toast(`✓ LOGGED: ${w} KG`);
      };

      const logF = () => {
        if (!fName.trim()) { toast('✗ FOOD NAME REQUIRED'); return; }
        const e = { id: numId(), date: TK, foodName: fName.trim().toUpperCase(), calories: parseInt(fCal) || 0, protein: parseInt(fPro) || 0 };
        setData(d => { const H = { ...d.health ?? H0 }; return { ...d, health: { ...H, foodLogs: [...(H.foodLogs ?? []), e] } }; });
        setFName(''); setFCal(''); setFPro(''); toast('✓ FOOD LOGGED');
      };

      const delF = id => { setData(d => { const H = { ...d.health ?? H0 }; return { ...d, health: { ...H, foodLogs: (H.foodLogs ?? []).filter(f => f.id !== id) } }; }); };

      return h('div', { className: 'fade' },
        h('div', { style: S.g('1fr 1fr') },
          // Weight card
          h('div', { style: S.card() },
            h('div', { style: S.cardH }, '⚖ WEIGHT TRACKING'),
            h('div', { style: { ...S.row(), gap: 20, marginBottom: 10, flexWrap: 'wrap' } },
              h('div', null, h('div', { style: S.lbl }, 'CURRENT'), h('div', { style: S.bold(22) }, (lastW ? lastW.weight : sw) + ' KG')),
              h('div', null, h('div', { style: S.lbl }, 'TARGET'), h('div', { style: S.bold(22) }, tw + ' KG')),
              h('div', null, h('div', { style: S.lbl }, 'PROGRESS'), h('div', { style: { ...S.bold(22), color: wPct >= 100 ? GREEN : TXT } }, wPct + '%'))
            ),
            h('div', { style: S.track(8) }, h('div', { style: S.fill(wPct) })),
            sortedW.length >= 2 && h('div', { style: { marginTop: 12 } },
              h('div', { style: { ...S.lbl, marginBottom: 4 } }, 'WEIGHT HISTORY (LAST 14)'),
              h(WeightChart, { weights: sortedW.slice(-14) })
            ),
            h('div', { style: { ...S.lbl, marginTop: 12, marginBottom: 6 } }, 'LOG WEIGHT (KG)'),
            h('div', { style: S.row(8) },
              h('input', {
                value: wIn, onChange: e => setWIn(e.target.value), placeholder: '56.5', type: 'number',
                style: { ...S.inp(false), flex: 1, fontSize: 13 }
              }),
              h('button', { onClick: logW, style: S.btn(true) }, 'LOG')
            ),
            sortedW.length > 0 && h('div', { style: { marginTop: 12 } },
              h('div', { style: { ...S.lbl, marginBottom: 4 } }, 'RECENT ENTRIES'),
              ...[...sortedW].reverse().slice(0, 5).map(w =>
                h('div', { key: w.id, style: { display: 'flex', justifyContent: 'space-between', padding: '3px 0', borderBottom: '1px solid #eee', fontSize: 11 } },
                  h('span', { style: S.lbl }, w.date), h('span', { style: { fontWeight: 'bold' } }, w.weight + ' KG')
                )
              )
            )
          ),
          // Nutrition card
          h('div', { style: S.card() },
            h('div', { style: S.cardH }, 'TODAY\'S NUTRITION'),
            h('div', { style: { marginBottom: 12 } },
              h('div', { style: { ...S.row(), justifyContent: 'space-between', marginBottom: 3 } },
                h('span', { style: { fontSize: 11, letterSpacing: 1 } }, 'CALORIES'),
                h('span', { style: { fontSize: 11, fontWeight: 'bold', color: calPct >= 100 ? GREEN : TXT } }, `${totCal} / ${tgt.calories} KCAL`)
              ),
              h('div', { style: S.track(10) }, h('div', { style: S.fill(calPct, calPct >= 100 ? GREEN : GMED) }))
            ),
            h('div', { style: { marginBottom: 16 } },
              h('div', { style: { ...S.row(), justifyContent: 'space-between', marginBottom: 3 } },
                h('span', { style: { fontSize: 11, letterSpacing: 1 } }, 'PROTEIN'),
                h('span', { style: { fontSize: 11, fontWeight: 'bold', color: proPct >= 100 ? GREEN : TXT } }, `${totPro} / ${tgt.protein} G`)
              ),
              h('div', { style: S.track(10) }, h('div', { style: S.fill(proPct, proPct >= 100 ? GREEN : '#a3e635') }))
            ),
            h('div', { style: { ...S.lbl, marginBottom: 6 } }, 'LOG FOOD'),
            h('input', {
              value: fName, onChange: e => setFName(e.target.value), placeholder: 'FOOD NAME',
              style: { ...S.inp(true), marginBottom: 6, letterSpacing: 1 }
            }),
            h('div', { style: { ...S.row(6), marginBottom: 10 } },
              h('input', { value: fCal, onChange: e => setFCal(e.target.value), placeholder: 'KCAL', type: 'number', style: { ...S.inp(false), flex: 1 } }),
              h('input', { value: fPro, onChange: e => setFPro(e.target.value), placeholder: 'PROTEIN (G)', type: 'number', style: { ...S.inp(false), flex: 1 } }),
              h('button', { onClick: logF, style: S.btn(true) }, 'LOG')
            ),
            todayFood.length > 0 && h('div', null,
              h('div', { style: { borderTop: '1px solid #ddd', paddingTop: 8 } },
                h('div', { style: { ...S.lbl, marginBottom: 6 } }, 'TODAY\'S FOOD LOG'),
                ...todayFood.map(f => h('div', {
                  key: f.id,
                  style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '4px 0', borderBottom: '1px solid #eee', fontSize: 11 }
                },
                  h('span', { style: { letterSpacing: 1 } }, f.foodName),
                  h('div', { style: S.row(8) },
                    h('span', { style: S.lbl }, `${f.calories}kcal · ${f.protein}g prot`),
                    h('button', { onClick: () => delF(f.id), style: { ...S.btn(false, true), fontSize: 9, padding: '1px 5px' } }, '✕')
                  )
                ))
              )
            )
          )
        )
      );
    }

    // ══════════════════════════════════════════════
    // FINANCE VIEW
    // ══════════════════════════════════════════════
    function FinanceView({ data, setData, toast, TK }) {
      const [amt, setAmt] = useState('');
      const [cat, setCat] = useState('FOOD');
      const [desc, setDesc] = useState('');
      const [mDate, setMDate] = useState(new Date());

      const F0 = { expenses: [], monthlyBudget: 5000 };
      const fin = data.finance ?? F0;
      const budget = fin.monthlyBudget || 5000;
      const expenses = fin.expenses ?? [];

      const y = mDate.getFullYear(), m = mDate.getMonth();
      const mk = `${y}-${(m + 1).toString().padStart(2, '0')}`;
      const mExp = expenses.filter(e => e.date.startsWith(mk));
      const mTotal = mExp.reduce((a, e) => a + (e.amount || 0), 0);
      const remaining = budget - mTotal;

      const catTotals = {};
      EXP_CATS.forEach(c => { catTotals[c] = mExp.filter(e => e.category === c).reduce((a, e) => a + e.amount, 0); });

      const add = () => {
        const a = parseFloat(amt);
        if (isNaN(a) || a <= 0) { toast('✗ INVALID AMOUNT'); return; }
        const e = { id: numId(), date: TK, amount: a, category: cat, description: (desc.trim().toUpperCase() || cat) };
        setData(d => { const F = { ...d.finance ?? F0 }; return { ...d, finance: { ...F, expenses: [e, ...(F.expenses ?? [])] } }; });
        setAmt(''); setDesc(''); toast(`✓ ₹${a} LOGGED`);
      };

      const del = id => setData(d => { const F = { ...d.finance ?? F0 }; return { ...d, finance: { ...F, expenses: (F.expenses ?? []).filter(e => e.id !== id) } }; });

      return h('div', { className: 'fade' },
        h('div', { style: S.g('200px 1fr', 12) },
          // Month summary
          h('div', { style: S.card() },
            h('div', { style: S.cardH }, '💰 MONTHLY'),
            h('div', { style: { marginBottom: 8 } },
              h('div', { style: S.lbl }, MONTHS_S[m] + ' ' + y),
              h('div', { style: { ...S.bold(24), color: mTotal > budget ? '#c00' : TXT } }, `₹${mTotal.toLocaleString()}`)
            ),
            h('div', { style: S.track(8) }, h('div', { style: S.fill(Math.min(100, mTotal / budget * 100), mTotal > budget ? '#c00' : GREEN) })),
            h('div', { style: { ...S.row(), gap: 16, marginTop: 8, flexWrap: 'wrap' } },
              h('div', null, h('div', { style: S.lbl }, 'BUDGET'), h('div', { style: S.bold() }, `₹${budget.toLocaleString()}`)),
              h('div', null, h('div', { style: S.lbl }, 'LEFT'), h('div', { style: { ...S.bold(), color: remaining < 0 ? '#c00' : GREEN } }, `₹${remaining.toLocaleString()}`))
            ),
            h('div', { style: { ...S.row(6), marginTop: 12 } },
              h('button', { style: S.btn(false, true), onClick: () => setMDate(new Date(y, m - 1, 1)) }, '◀'),
              h('button', { style: S.btn(false, true), onClick: () => setMDate(new Date()) }, 'NOW'),
              h('button', { style: S.btn(false, true), onClick: () => setMDate(new Date(y, m + 1, 1)) }, '▶')
            )
          ),
          // Category breakdown
          h('div', { style: S.card() },
            h('div', { style: S.cardH }, 'BY CATEGORY'),
            ...EXP_CATS.map(c => {
              const a = catTotals[c] ?? 0, pct = mTotal ? Math.round(a / mTotal * 100) : 0;
              return h('div', { key: c, style: { marginBottom: 10 } },
                h('div', { style: { ...S.row(), justifyContent: 'space-between', marginBottom: 3 } },
                  h('span', { style: { fontSize: 11, letterSpacing: 1 } }, c),
                  h('span', { style: { fontSize: 11 } }, `₹${a.toLocaleString()} · ${pct}%`)
                ),
                h('div', { style: S.track(6) }, h('div', { style: { ...S.fill(pct), background: CAT_CLR[c] ?? GREEN } }))
              );
            })
          )
        ),
        h('div', { style: { ...S.g('260px 1fr', 12), marginTop: 0 } },
          // Add form
          h('div', { style: S.card(0) },
            h('div', { style: S.cardH }, '+ LOG EXPENSE'),
            h('div', { style: { ...S.lbl, marginBottom: 4 } }, 'AMOUNT (₹)'),
            h('input', {
              value: amt, onChange: e => setAmt(e.target.value), placeholder: '150', type: 'number',
              style: { ...S.inp(true), fontSize: 14, marginBottom: 8 }
            }),
            h('div', { style: { ...S.lbl, marginBottom: 4 } }, 'CATEGORY'),
            h('select', {
              value: cat, onChange: e => setCat(e.target.value),
              style: { width: '100%', padding: '5px 8px', border: BD, background: BG, fontFamily: MONO, fontSize: 11, color: TXT, marginBottom: 8, outline: 'none', letterSpacing: 1 }
            },
              ...EXP_CATS.map(c => h('option', { key: c, value: c }, c))
            ),
            h('div', { style: { ...S.lbl, marginBottom: 4 } }, 'DESCRIPTION'),
            h('input', {
              value: desc, onChange: e => setDesc(e.target.value), placeholder: 'LUNCH, AUTO, BOOK...',
              style: { ...S.inp(true), marginBottom: 12, letterSpacing: 1 }
            }),
            h('button', { onClick: add, style: { ...S.btn(true), width: '100%', padding: 9, letterSpacing: 2 } }, 'LOG EXPENSE')
          ),
          // Expense list
          h('div', { style: S.card(0) },
            h('div', { style: S.cardH }, 'EXPENSE LOG'),
            mExp.length === 0
              ? h('div', { style: S.lbl }, 'No expenses logged this month.')
              : [...mExp].sort((a, b) => b.date.localeCompare(a.date)).map(e =>
                h('div', { key: e.id, style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '6px 0', borderBottom: '1px solid #eee', fontSize: 11 } },
                  h('div', null,
                    h('div', { style: { ...S.row(8) } },
                      h('span', { style: { fontSize: 9, padding: '1px 5px', border: '1px solid #aaa', background: BG, letterSpacing: 1 } }, e.category),
                      h('span', { style: { letterSpacing: 1 } }, e.description)
                    ),
                    h('div', { style: { ...S.lbl, marginTop: 2 } }, e.date)
                  ),
                  h('div', { style: S.row(8) },
                    h('span', { style: { fontWeight: 'bold' } }, `₹${e.amount.toLocaleString()}`),
                    h('button', { onClick: () => del(e.id), style: { ...S.btn(false, true), fontSize: 9, padding: '1px 5px' } }, '✕')
                  )
                )
              )
          )
        )
      );
    }

    // ══════════════════════════════════════════════
    // INITIAL STATE
    // ══════════════════════════════════════════════
    const INIT = {
      setupDone: false,
      user: {
        name: '', totalXp: 0, coins: 0, longestStreak: 0,
        stats: { intelligence: 0, builder: 0, discipline: 0, vitality: 0, wealth: 0 }
      },
      dayData: {},
      weeklyProgress: {},
      backlogs: [],
      redeemed: [],
      notes: [],
      health: { weights: [], foodLogs: [], targets: { calories: 2500, protein: 100, targetWeight: 65, startWeight: 56 } },
      finance: { expenses: [], monthlyBudget: 5000 },
      lastBacklogCheck: null,
    };

    // ══════════════════════════════════════════════
    // APP
    // ══════════════════════════════════════════════
    function App() {
      const [data, setData] = useState(INIT);
      const [ready, setReady] = useState(false);
      const [view, setView] = useState('dash');
      const [calDate, setCalDate] = useState(new Date());
      const [yearDate, setYearDate] = useState(new Date());
      const [selDay, setSelDay] = useState(null);
      const [setupName, setSetupName] = useState('DEEPAK');
      const [notif, setNotif] = useState(null);
      const [showReset, setShowReset] = useState(false);
      const blChecked = useRef(false);

      // Load
      useEffect(() => {
        const saved = db.load();
        if (saved) setData(d => ({ ...INIT, ...saved }));
        setReady(true);
      }, []);

      // Save
      useEffect(() => { if (ready) db.save(data); }, [data, ready]);

      // Auto-backlog detection (once per session, for yesterday)
      useEffect(() => {
        if (!ready || !data.setupDone || blChecked.current) return;
        blChecked.current = true;
        const yesterday = dKey(new Date(Date.now() - 86400000));
        if (data.lastBacklogCheck === yesterday) return;
        const yData = data.dayData[yesterday];
        if (!yData) { setData(d => ({ ...d, lastBacklogCheck: yesterday })); return; }
        const incomplete = QUESTS.filter(q => !yData.quests.includes(q.id));
        if (incomplete.length === 0) { setData(d => ({ ...d, lastBacklogCheck: yesterday })); return; }
        const existing = new Set((data.backlogs ?? []).map(b => b.id));
        const newBL = incomplete
          .map(q => ({ id: `bl_${q.id}_${yesterday}`, questName: q.name, amount: 1, date: yesterday }))
          .filter(b => !existing.has(b.id));
        if (newBL.length > 0) {
          setData(d => ({ ...d, backlogs: [...(d.backlogs ?? []), ...newBL], lastBacklogCheck: yesterday }));
          toast(`⚠ ${newBL.length} QUEST(S) ADDED TO BACKLOG FROM YESTERDAY`);
        } else {
          setData(d => ({ ...d, lastBacklogCheck: yesterday }));
        }
      }, [ready, data.setupDone]);

      // Derived
      const TK = TODAY;
      const todayData = data.dayData[TK] ?? { quests: [], xp: 0, coins: 0 };
      const rank = getRank(data.user.totalXp);
      const rankIdx = RANKS.findIndex(r => r.l === rank.l);
      const nextRank = RANKS[rankIdx + 1];
      const xpPct = nextRank ? Math.min(100, Math.round((data.user.totalXp - rank.min) / (nextRank.min - rank.min) * 100)) : 100;
      const wk = wKey(new Date());
      const weekProg = data.weeklyProgress[wk] ?? {};
      const streak = useMemo(() => calcStreak(data.dayData), [data.dayData]);

      const toast = msg => { setNotif(msg); setTimeout(() => setNotif(null), 2800); };

      // Actions
      const doSetup = () => { if (!setupName.trim()) return; setData(d => ({ ...d, setupDone: true, user: { ...d.user, name: setupName.trim().toUpperCase() } })); };

      const toggleQuest = qid => {
        setData(d => {
          const q = QUESTS.find(x => x.id === qid);
          const day = d.dayData[TK] ?? { quests: [], xp: 0, coins: 0 };
          const isDone = day.quests.includes(qid);
          const newQ = isDone ? day.quests.filter(x => x !== qid) : [...day.quests, qid];
          const m = isDone ? -1 : 1;
          const newStats = { ...d.user.stats };
          Object.entries(q.gains).forEach(([k, v]) => { newStats[k] = Math.max(0, newStats[k] + v * m); });
          const newDD = { ...d.dayData, [TK]: { quests: newQ, xp: Math.max(0, (day.xp ?? 0) + q.xp * m), coins: Math.max(0, (day.coins ?? 0) + q.coins * m) } };
          const ns = calcStreak(newDD);
          return {
            ...d,
            user: { ...d.user, totalXp: Math.max(0, d.user.totalXp + q.xp * m), coins: Math.max(0, d.user.coins + q.coins * m), stats: newStats, longestStreak: Math.max(d.user.longestStreak, ns) },
            dayData: newDD
          };
        });
      };

      const adjWeekly = (gid, delta) => {
        setData(d => {
          const g = WEEKLY.find(x => x.id === gid);
          const wp = d.weeklyProgress[wk] ?? {};
          const cur = wp[gid] ?? 0;
          const nv = Math.max(0, Math.min(cur + delta, g.target));
          return { ...d, weeklyProgress: { ...d.weeklyProgress, [wk]: { ...wp, [gid]: nv } } };
        });
      };

      const clearBacklog = id => setData(d => ({ ...d, backlogs: (d.backlogs ?? []).filter(b => b.id !== id) }));

      const buyItem = item => {
        setData(d => {
          if (d.user.coins < item.cost) { toast('✗ INSUFFICIENT COINS'); return d; }
          toast('✓ REDEEMED: ' + item.name);
          return { ...d, user: { ...d.user, coins: d.user.coins - item.cost }, redeemed: [...(d.redeemed ?? []), (Object.assign({}, { id: numId(), item: item.name, date: TK }))], };
        });
      };

      const resetData = () => { setData(INIT); db.save(INIT); setShowReset(false); setView('dash'); setSelDay(null); blChecked.current = false; };

      // ── LOADING ──
      if (!ready) return h('div', { style: { ...S.app, display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh' } },
        h('span', { style: { letterSpacing: 3 } }, 'INITIALIZING...'));

      // ── SETUP ──
      if (!data.setupDone) return h('div', { style: { ...S.app, display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh' } },
        h('div', { style: { border: BD, padding: 36, maxWidth: 400, width: '100%', background: BG2 } },
          h('div', { style: { fontSize: 22, fontWeight: 'bold', letterSpacing: 5, marginBottom: 4 } }, 'LEVELING UP'),
          h('div', { style: { ...S.lbl, marginBottom: 28, letterSpacing: 2 } }, 'PERSONAL OPERATING SYSTEM v1.1'),
          h('div', { style: { ...S.lbl, marginBottom: 6 } }, 'YOUR NAME'),
          h('input', {
            value: setupName, onChange: e => setSetupName(e.target.value.toUpperCase()), onKeyDown: e => e.key === 'Enter' && doSetup(),
            style: { width: '100%', padding: '9px 11px', border: BD, background: BG, fontFamily: MONO, fontSize: 16, letterSpacing: 2, color: TXT, marginBottom: 8, outline: 'none' }
          }),
          h('div', { style: { fontSize: 11, color: DIM, marginBottom: 24, lineHeight: 1.9, fontStyle: 'italic', borderLeft: '2px solid #aaa', paddingLeft: 10 } },
            '"The only competition is yesterday\'s version of you."'),
          h('button', { onClick: doSetup, style: { ...S.btn(true), width: '100%', padding: 12, fontSize: 13, letterSpacing: 3 } }, 'BEGIN JOURNEY →')
        )
      );

      // ── MAIN ──
      const NAV = [['dash', 'DASH'], ['cal', 'CAL'], ['year', 'YEAR'], ['notes', 'NOTES'], ['health', 'HEALTH'], ['finance', 'FINANCE'], ['stats', 'STATS'], ['shop', 'SHOP']];

      return h('div', { style: S.app },
        notif && h('div', { style: { position: 'fixed', top: 12, right: 16, background: TXT, color: BG, padding: '8px 16px', fontSize: 11, letterSpacing: 2, zIndex: 9999, border: BD, maxWidth: 360 } }, notif),
        h('div', { style: S.topBar },
          h('div', { style: S.logo }, '>_ LEVELING UP'),
          h('div', { style: S.navRow },
            ...NAV.map(([v, l]) => h('button', { key: v, style: S.btn(view === v), onClick: () => setView(v) }, l)),
            h('div', { style: { ...S.badge(GREEN), marginLeft: 4 } }, h('span', { style: { color: GREEN } }, '●'), ' ', rank.l, ' | ', data.user.name),
            h('button', { style: { ...S.btn(showReset, true), marginLeft: 2 }, onClick: () => setShowReset(s => !s) }, '⚙')
          )
        ),
        showReset && h('div', { style: { ...S.card(0), margin: '8px 16px 0', background: '#fff3f3', border: '1px solid #f99', display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' } },
          h('span', { style: { flex: 1, fontSize: 11, color: '#800', letterSpacing: 1 } }, '⚠ RESET ALL DATA? Cannot be undone.'),
          h('button', { style: S.btn(false, true), onClick: () => setShowReset(false) }, 'CANCEL'),
          h('button', { style: { ...S.btn(false, true), background: '#900', color: BG, borderColor: '#900' }, onClick: resetData }, 'CONFIRM RESET')
        ),
        h('div', { style: S.page },
          view === 'dash' && renderDash(),
          view === 'cal' && renderCal(),
          view === 'year' && renderYear(),
          view === 'notes' && h(NotesView, { data, setData, toast }),
          view === 'health' && h(HealthView, { data, setData, toast, TK }),
          view === 'finance' && h(FinanceView, { data, setData, toast, TK }),
          view === 'stats' && renderStats(),
          view === 'shop' && renderShop()
        )
      );

      // ══════════════════════════════════════════
      // DASHBOARD
      // ══════════════════════════════════════════
      function renderDash() {
        const dc = todayData.quests.length, pct = Math.round(dc / QUESTS.length * 100);
        return h('div', { className: 'fade' },
          h('div', { style: { ...S.card(), display: 'flex', gap: 20, alignItems: 'center', flexWrap: 'wrap' } },
            h('div', { style: { minWidth: 55 } },
              h('div', { style: S.lbl }, 'RANK'),
              h('div', { style: { fontSize: 34, fontWeight: 'bold', letterSpacing: 4, lineHeight: 1 } }, rank.l),
              nextRank && h('div', { style: { fontSize: 9, color: DIM, marginTop: 2 } }, `${(nextRank.min - data.user.totalXp).toLocaleString()} XP → ${nextRank.l}`)
            ),
            h('div', { style: { flex: 1, minWidth: 180 } },
              h('div', { style: { ...S.row(), justifyContent: 'space-between', marginBottom: 4 } },
                h('span', { style: S.lbl }, 'XP'),
                h('span', { style: { fontSize: 11, color: DIM } }, `${data.user.totalXp.toLocaleString()} / ${nextRank ? nextRank.min.toLocaleString() : 'MAX'}`)
              ),
              h('div', { style: S.track(10) }, h('div', { style: S.fill(xpPct, TXT) }))
            ),
            h('div', { style: { textAlign: 'center' } }, h('div', { style: S.lbl }, 'STREAK'), h('div', { style: { ...S.bold(22), color: streak > 0 ? GREEN : TXT } }, `🔥${streak}D`)),
            h('div', { style: { textAlign: 'center' } }, h('div', { style: S.lbl }, 'COINS'), h('div', { style: S.bold(22) }, `⚡${data.user.coins}`)),
            h('div', { style: { textAlign: 'center' } }, h('div', { style: S.lbl }, 'TODAY'), h('div', { style: { ...S.bold(22), color: pct >= 70 ? GREEN : TXT } }, `${pct}%`))
          ),
          h('div', { style: S.g('3fr 2fr') },
            h('div', null,
              h('div', { style: S.card() },
                h('div', { style: S.cardH }, '📋 TODAY\'S QUESTS',
                  h('span', { style: { ...S.lbl, fontWeight: 'normal', marginLeft: 'auto' } }, `${dc}/${QUESTS.length} · +${todayData.xp ?? 0} XP`)
                ),
                ...QUESTS.map(q => {
                  const c = todayData.quests.includes(q.id);
                  return h('div', { key: q.id, style: S.qrow(c), onClick: () => toggleQuest(q.id) },
                    h('div', { style: S.chk(c) }, c && '✓'),
                    h('div', { style: { flex: 1, letterSpacing: 1, textDecoration: c ? 'line-through' : 'none', color: c ? DIM : TXT } }, q.name),
                    h('div', { style: { ...S.lbl, textAlign: 'right', lineHeight: 1.5 } }, h('div', null, `+${q.xp}XP`), h('div', null, `+${q.coins}⚡`))
                  );
                }),
                h('div', { style: { marginTop: 8, paddingTop: 6, borderTop: '1px solid #ddd', ...S.lbl, display: 'flex', justifyContent: 'space-between' } },
                  h('span', null, `${dc}/${QUESTS.length} COMPLETE`),
                  h('span', null, pct >= 70 ? '✓ STREAK SAFE' : `⚠ NEED ${Math.max(0, Math.ceil(QUESTS.length * .7) - dc)} MORE`)
                )
              ),
              (data.backlogs ?? []).length > 0 && h('div', { style: S.card() },
                h('div', { style: S.cardH }, `⚠ BACKLOG (${(data.backlogs ?? []).length})`),
                ...(data.backlogs ?? []).map(b => h('div', { key: b.id, style: { ...S.row(), justifyContent: 'space-between', padding: '6px 0', borderBottom: '1px solid #e0e0e0' } },
                  h('div', null, h('div', { style: { letterSpacing: 1 } }, b.questName), h('div', { style: S.lbl }, `${b.amount} PENDING · ${b.date}`)),
                  h('button', { onClick: () => clearBacklog(b.id), style: S.btn(false, true) }, 'CLEAR')
                ))
              )
            ),
            h('div', null,
              h('div', { style: S.card() },
                h('div', { style: S.cardH }, '⬡ CHARACTER STATS'),
                ...STATS.map(stat => {
                  const val = data.user.stats[stat], pct = Math.min(100, val / 2);
                  return h('div', { key: stat, style: { marginBottom: 9 } },
                    h('div', { style: { ...S.row(), justifyContent: 'space-between', marginBottom: 3 } },
                      h('span', { style: { fontSize: 11, letterSpacing: 1 } }, `${SICON[stat]} ${stat.toUpperCase()}`),
                      h('span', { style: { fontSize: 11, fontWeight: 'bold' } }, val)
                    ),
                    h('div', { style: S.track(6) }, h('div', { style: S.fill(pct) }))
                  );
                })
              ),
              h('div', { style: S.card(0) },
                h('div', { style: S.cardH }, 'WEEKLY GOALS'),
                ...WEEKLY.map(g => {
                  const cur = weekProg[g.id] ?? 0, p = Math.round(cur / g.target * 100), done = cur >= g.target;
                  return h('div', { key: g.id, style: { marginBottom: 10 } },
                    h('div', { style: { ...S.row(), justifyContent: 'space-between', marginBottom: 3 } },
                      h('span', { style: { fontSize: 11, letterSpacing: 1, color: done ? GREEN : TXT } }, `${done ? '✓ ' : ''}${g.name}`),
                      h('div', { style: S.row(4) },
                        h('button', { onClick: () => adjWeekly(g.id, -1), style: { ...S.btn(false, true), padding: '0 8px', fontSize: 14 } }, '−'),
                        h('span', { style: { fontSize: 11, minWidth: 30, textAlign: 'center' } }, `${cur}/${g.target}`),
                        h('button', { onClick: () => adjWeekly(g.id, 1), style: { ...S.btn(false, true), padding: '0 8px', fontSize: 14 } }, '+')
                      )
                    ),
                    h('div', { style: S.track(5) }, h('div', { style: S.fill(p, done ? GREEN : GMED) }))
                  );
                })
              )
            )
          )
        );
      }

      // ══════════════════════════════════════════
      // CALENDAR
      // ══════════════════════════════════════════
      function renderCal() {
        const y = calDate.getFullYear(), m = calDate.getMonth(), cells = monthGrid(y, m);
        return h('div', { style: S.g('1fr 270px'), className: 'fade' },
          h('div', { style: S.card(0) },
            h('div', { style: { ...S.rowW(), justifyContent: 'space-between', marginBottom: 12 } },
              h('div', { style: S.cardH }, 'HABIT CALENDAR'),
              h('div', { style: S.row(6) },
                h('button', { style: S.btn(), onClick: () => setCalDate(new Date(y, m - 1, 1)) }, 'PREV'),
                h('div', { style: { padding: '4px 12px', border: BD, fontSize: 12, letterSpacing: 2, fontWeight: 'bold', background: BG2 } }, `${MONTHS[m]} ${y}`),
                h('button', { style: S.btn(), onClick: () => setCalDate(new Date(y, m + 1, 1)) }, 'NEXT'),
                h('button', { style: S.btn(), onClick: () => setCalDate(new Date()) }, 'TODAY')
              )
            ),
            h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: 2, marginBottom: 2 } },
              ...DAYS.map(d => h('div', { key: d, style: { textAlign: 'center', ...S.lbl, padding: '3px 0' } }, d))
            ),
            h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: 2 } },
              ...cells.map((day, i) => {
                if (!day) return h('div', { key: i, style: { minHeight: 54, background: '#e8e8e8', opacity: .3 } });
                const k = dKey(new Date(y, m, day)), dd = data.dayData[k] ?? { quests: [] };
                const inten = getInten(dd.quests.length, QUESTS.length), isT = k === TK, isSel = k === selDay;
                return h('div', { key: i, style: S.dayCell(inten, isT, isSel), onClick: () => setSelDay(k) },
                  h('div', { style: { color: inten > 1 ? '#155e2f' : TXT, fontWeight: isT ? 'bold' : 'normal' } }, day),
                  dd.quests.length > 0 && h('div', { style: { fontSize: 9, color: inten > 1 ? '#155e2f' : GREEN } }, `${dd.quests.length}/${QUESTS.length}`)
                );
              })
            ),
            h('div', { style: { ...S.row(12), marginTop: 12, ...S.lbl } },
              h('span', null, 'INTENSITY LEVEL:'),
              ...IL.map((l, i) => h('div', { key: l, style: S.row(4) }, h('div', { style: { width: 12, height: 12, background: IC[i], border: '1px solid #aaa' } }), h('span', null, l)))
            )
          ),
          h('div', { style: S.card(0) },
            h('div', { style: S.cardH }, 'DAILY SUMMARY'),
            selDay ? (() => {
              const sd = data.dayData[selDay] ?? { quests: [], xp: 0, coins: 0 };
              const dt = new Date(selDay + 'T00:00:00'), inten = getInten(sd.quests.length, QUESTS.length);
              return h('div', null,
                h('div', { style: { marginBottom: 10, paddingBottom: 8, borderBottom: '1px solid #ddd' } },
                  h('div', { style: { fontWeight: 'bold', letterSpacing: 1, marginBottom: 2, fontSize: 13 } }, `${MONTHS_S[dt.getMonth()]} ${dt.getDate()}, ${dt.getFullYear()}`),
                  h('div', { style: S.lbl }, `${sd.quests.length}/${QUESTS.length} · ${IL[inten]}`)
                ),
                h('div', { style: { ...S.row(), marginBottom: 12, gap: 16 } },
                  h('div', null, h('div', { style: S.lbl }, 'XP'), h('div', { style: S.bold() }, sd.xp ?? 0)),
                  h('div', null, h('div', { style: S.lbl }, 'COINS'), h('div', { style: S.bold() }, sd.coins ?? 0))
                ),
                h('div', { style: { ...S.lbl, marginBottom: 6 } }, 'QUESTS'),
                ...QUESTS.map(q => {
                  const done = sd.quests.includes(q.id);
                  return h('div', { key: q.id, style: { fontSize: 11, padding: '5px 0', borderBottom: '1px solid #eee', display: 'flex', gap: 7, alignItems: 'center' } },
                    h('span', { style: { color: done ? GREEN : '#ccc' } }, done ? '✓' : '○'),
                    h('span', { style: { letterSpacing: 1, opacity: done ? 1 : .4 } }, q.name)
                  );
                })
              );
            })()
              : h('div', { style: { ...S.lbl, lineHeight: 1.9 } }, 'Select a day in the calendar to see a summary.')
          )
        );
      }

      // ══════════════════════════════════════════
      // YEAR
      // ══════════════════════════════════════════
      function renderYear() {
        const y = yearDate.getFullYear();
        return h('div', { style: S.card(0), className: 'fade' },
          h('div', { style: { ...S.rowW(), justifyContent: 'space-between', marginBottom: 16 } },
            h('div', { style: S.cardH }, 'YEARLY OVERVIEW'),
            h('div', { style: S.row(6) },
              h('button', { style: S.btn(), onClick: () => setYearDate(new Date(y - 1, 0, 1)) }, '← PREV'),
              h('span', { style: { fontSize: 16, fontWeight: 'bold', letterSpacing: 4, padding: '0 12px' } }, y),
              h('button', { style: S.btn(), onClick: () => setYearDate(new Date(y + 1, 0, 1)) }, 'NEXT →'),
              h('button', { style: S.btn(), onClick: () => setYearDate(new Date()) }, 'TODAY')
            )
          ),
          h('div', { style: S.g('repeat(4,1fr)', 14) },
            ...Array.from({ length: 12 }, (_, mi) => {
              const cells = monthGrid(y, mi);
              return h('div', { key: mi, style: { border: BD, padding: 10 } },
                h('div', { style: { fontSize: 11, fontWeight: 'bold', letterSpacing: 2, marginBottom: 7, textAlign: 'center' } }, MONTHS_S[mi]),
                h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(7,13px)', gap: 2, justifyContent: 'center' } },
                  ...['M', 'T', 'W', 'T', 'F', 'S', 'S'].map((d, i) => h('div', { key: 'h' + i, style: { width: 13, height: 13, fontSize: 8, color: DIM, textAlign: 'center', lineHeight: '13px' } }, d)),
                  ...cells.map((day, i) => {
                    if (!day) return h('div', { key: i, style: { width: 13, height: 13 } });
                    const k = dKey(new Date(y, mi, day)), dd = data.dayData[k] ?? { quests: [] };
                    const inten = getInten(dd.quests.length, QUESTS.length), isT = k === TK;
                    return h('div', {
                      key: i, style: S.mini(inten, isT),
                      title: `${MONTHS_S[mi]} ${day}: ${dd.quests.length}/${QUESTS.length}`,
                      onClick: () => { setView('cal'); setCalDate(new Date(y, mi, day)); setSelDay(k); }
                    });
                  })
                )
              );
            })
          ),
          h('div', { style: { ...S.row(12), marginTop: 16, ...S.lbl } },
            h('span', null, 'INTENSITY LEVEL:'),
            ...IL.map((l, i) => h('div', { key: l, style: S.row(4) }, h('div', { style: { width: 12, height: 12, background: IC[i], border: '1px solid #aaa' } }), h('span', null, l)))
          )
        );
      }

      // ══════════════════════════════════════════
      // STATS
      // ══════════════════════════════════════════
      function renderStats() {
        const allDays = Object.entries(data.dayData), total = allDays.length;
        const qRates = QUESTS.map(q => {
          const done = allDays.filter(([, dd]) => dd.quests.includes(q.id)).length;
          return { ...q, done, rate: total ? Math.round(done / total * 100) : 0 };
        });
        const dow = Array(7).fill(null).map(() => ({ qc: Array(QUESTS.length).fill(0), tot: 0 }));
        allDays.forEach(([k, dd]) => {
          const d = new Date(k + 'T00:00:00'), i = (d.getDay() + 6) % 7;
          dow[i].tot++;
          QUESTS.forEach((q, qi) => { if (dd.quests.includes(q.id)) dow[i].qc[qi]++; });
        });
        return h('div', { className: 'fade' },
          h('div', { style: S.g('1fr 1fr 1fr') },
            h('div', { style: S.card() },
              h('div', { style: S.cardH }, '🔥 STREAKS'),
              h('div', { style: { marginBottom: 14 } }, h('div', { style: S.lbl }, 'CURRENT STREAK'), h('div', { style: { ...S.bold(32), color: streak > 0 ? GREEN : TXT, lineHeight: 1.1 } }, `${streak} DAYS`)),
              h('div', null, h('div', { style: S.lbl }, 'LONGEST STREAK'), h('div', { style: S.bold(20) }, `${data.user.longestStreak} DAYS`))
            ),
            h('div', { style: S.card() },
              h('div', { style: S.cardH }, 'OVERVIEW'),
              ...[['DAYS TRACKED', total], ['TOTAL XP', data.user.totalXp.toLocaleString()], ['COINS HELD', data.user.coins], ['NOTES WRITTEN', (data.notes ?? []).length]].map(([l, v]) =>
                h('div', { key: l, style: { display: 'flex', justifyContent: 'space-between', padding: '5px 0', borderBottom: '1px solid #eee', fontSize: 11 } },
                  h('span', { style: S.lbl }, l), h('span', { style: { fontWeight: 'bold' } }, v)
                )
              )
            ),
            h('div', { style: S.card() },
              h('div', { style: S.cardH }, '⬡ CHARACTER STATS'),
              ...STATS.map(stat => {
                const val = data.user.stats[stat], pct = Math.min(100, val / 2);
                return h('div', { key: stat, style: { marginBottom: 8 } },
                  h('div', { style: { ...S.row(), justifyContent: 'space-between', marginBottom: 2 } },
                    h('span', { style: { fontSize: 11, letterSpacing: 1 } }, `${SICON[stat]} ${stat.toUpperCase()}`),
                    h('span', { style: { fontSize: 11, fontWeight: 'bold' } }, val)
                  ),
                  h('div', { style: S.track(5) }, h('div', { style: S.fill(pct) }))
                );
              })
            )
          ),
          h('div', { style: S.card() },
            h('div', { style: S.cardH }, 'COMPLETION RATES'),
            h('div', { style: S.g('1fr 1fr') },
              ...qRates.map(q => h('div', { key: q.id, style: { marginBottom: 10 } },
                h('div', { style: { ...S.row(), justifyContent: 'space-between', marginBottom: 3 } },
                  h('span', { style: { fontSize: 11, letterSpacing: 1 } }, q.name),
                  h('span', { style: { fontSize: 11, fontWeight: 'bold' } }, `${q.rate}%`)
                ),
                h('div', { style: S.track(6) }, h('div', { style: S.fill(q.rate) }))
              ))
            )
          ),
          h('div', { style: S.card(0) },
            h('div', { style: S.cardH }, 'DAILY PATTERNS'),
            h('div', { style: S.g('repeat(7,1fr)', 8) },
              ...DAYS.map((day, di) => {
                const { qc, tot } = dow[di];
                const sum = qc.reduce((a, b) => a + b, 0), avg = tot ? Math.round(sum / tot / QUESTS.length * 100) : 0;
                return h('div', { key: day, style: { textAlign: 'center' } },
                  h('div', { style: { ...S.lbl, marginBottom: 6 } }, day),
                  ...QUESTS.map((q, qi) => {
                    const p = tot ? Math.round(qc[qi] / tot * 100) : 0;
                    return h('div', { key: q.id, style: { display: 'flex', marginBottom: 2 } },
                      h('div', { style: { flex: 1, height: 6, background: '#ddd' } }, h('div', { style: { height: '100%', width: p + '%', background: GMED } }))
                    );
                  }),
                  h('div', { style: { fontSize: 10, color: avg >= 70 ? GREEN : DIM, marginTop: 4, fontWeight: 'bold' } }, `${avg}%`)
                );
              })
            )
          )
        );
      }

      // ══════════════════════════════════════════
      // SHOP
      // ══════════════════════════════════════════
      function renderShop() {
        const redeemed = data.redeemed ?? [];
        return h('div', { className: 'fade' },
          h('div', { style: S.card() },
            h('div', { style: S.cardH }, '⚡ REWARD SHOP'),
            h('div', { style: { ...S.lbl, marginBottom: 16 } }, 'BALANCE: ', h('span', { style: { fontWeight: 'bold', color: TXT, fontSize: 15 } }, `${data.user.coins} COINS`)),
            h('div', { style: S.g('repeat(3,1fr)', 10) },
              ...SHOP.map(item => {
                const can = data.user.coins >= item.cost;
                return h('div', { key: item.id, style: { border: BD, padding: 14, background: can ? BG2 : BG, opacity: can ? 1 : .65 } },
                  h('div', { style: { fontWeight: 'bold', letterSpacing: 2, marginBottom: 4, fontSize: 12 } }, item.name),
                  h('div', { style: { ...S.lbl, marginBottom: 4 } }, `${item.cost} COINS`),
                  h('div', { style: { fontSize: 10, color: DIM, marginBottom: 12, lineHeight: 1.6 } }, item.desc),
                  h('button', {
                    onClick: () => buyItem(item), disabled: !can,
                    style: { ...S.btn(can), width: '100%', padding: 7, letterSpacing: 2, cursor: can ? 'pointer' : 'not-allowed' }
                  },
                    can ? 'REDEEM' : `NEED ${(item.cost - data.user.coins).toLocaleString()}`)
                );
              })
            )
          ),
          redeemed.length > 0 && h('div', { style: S.card(0) },
            h('div', { style: S.cardH }, 'REDEMPTION HISTORY'),
            ...[...redeemed].reverse().slice(0, 10).map((r, i) =>
              h('div', { key: i, style: { ...S.row(), justifyContent: 'space-between', padding: '5px 0', borderBottom: '1px solid #eee', fontSize: 11 } },
                h('span', { style: { letterSpacing: 1 } }, r.item), h('span', { style: S.lbl }, r.date)
              )
            )
          )
        );
      }
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>

</html>
