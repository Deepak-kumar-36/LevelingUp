             L 380 800 
             L 512 600 
             L 644 800 
             L 774 800 
             L 512 350 
             Z" 
          fill="#ffffff" />

    <!-- Inner Chevron -->
    <path d="M 512 470 
             L 350 730 
             L 430 730
             L 512 600
             L 594 730
             L 674 730
             Z" 
          fill="#ffffff" />
  </g>
</svg>
